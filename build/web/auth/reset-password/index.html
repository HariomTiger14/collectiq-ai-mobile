<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reset Your Packlox Password</title>
  <link rel="stylesheet" href="/auth/reset-password/styles.css">
  <!-- 1. Safe storage override -->
  <script>
    // Force safe storage BEFORE Supabase loads
    window.localStorage = {
      getItem: () => null,
      setItem: () => {},
      removeItem: () => {}
    };
  </script>
</head>
<body>
  <main class="page-shell">
    <section class="reset-card" aria-labelledby="page-title">
      <div class="brand-mark" aria-hidden="true">P</div>
      <p class="brand-name">Packlox</p>
      <h1 id="page-title">Reset your password</h1>
      <p class="subtitle">Create a new password to secure your account</p>

      <div
        id="message"
        class="message"
        role="alert"
        aria-live="polite"
        hidden
      ></div>

      <form id="reset-form" class="reset-form" novalidate>
        <div class="field-group">
          <label for="password">New password</label>
          <div class="password-control">
            <input
              id="password"
              name="password"
              type="password"
              autocomplete="new-password"
              aria-describedby="password-error password-help strength-label"
              aria-invalid="false"
              required
            >
            <button
              id="togglePassword"
              class="toggle-password"
              type="button"
              data-target="password"
              aria-label="Show new password"
            >
              <span aria-hidden="true">👁</span>
            </button>
          </div>
          <p id="password-help" class="field-help">
            Use 8+ characters with uppercase, lowercase, number, and symbol.
          </p>
          <p id="password-error" class="field-message" aria-live="polite"></p>
        </div>

        <div class="strength" aria-hidden="true">
          <div id="strength-bar" class="strength-bar"></div>
        </div>
        <p id="strength-label" class="strength-label" aria-live="polite">
          Password strength: empty
        </p>

        <div class="field-group">
          <label for="confirm-password">Confirm password</label>
          <div class="password-control">
            <input
              id="confirm-password"
              name="confirm-password"
              type="password"
              autocomplete="new-password"
              aria-describedby="confirm-error"
              aria-invalid="false"
              required
            >
            <button
              id="toggleConfirmPassword"
              class="toggle-password"
              type="button"
              data-target="confirm-password"
              aria-label="Show confirmed password"
            >
              <span aria-hidden="true">👁</span>
            </button>
          </div>
          <p id="confirm-error" class="field-message" aria-live="polite"></p>
        </div>

        <button id="submit" class="submit-button" type="submit">
          <span class="button-label">Update password</span>
          <span class="spinner" aria-hidden="true"></span>
        </button>
      </form>

      <p id="redirect-status" class="redirect-status" aria-live="polite"></p>
    </section>
  </main>

  <script type="module" src="/auth/reset-password/supabase-js-v2.js"></script>
  <script type="module" src="/auth/reset-password/supabaseClient.js"></script>
  <script type="module" src="/auth/reset-password/reset-password.js"></script>
</body>
</html>
